apiVersion: v1
kind: Namespace
metadata:
  name: harness-delegate-ng


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: harness-delegate-ng-cluster-admin
subjects:
- kind: ServiceAccount
  name: default
  namespace: harness-delegate-ng
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io


---
apiVersion: v1
kind: Secret
metadata:
  name: sample-delegate-account-token
  namespace: harness-delegate-ng
type: Opaque
data:
  DELEGATE_TOKEN: ""



---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    harness.io/name: sample-delegate
  name: sample-delegate
  namespace: harness-delegate-ng
spec:
  replicas: 1
  minReadySeconds: 120
  selector:
    matchLabels:
      harness.io/name: sample-delegate
  template:
    metadata:
      labels:
        harness.io/name: sample-delegate
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3460"
        prometheus.io/path: "/api/metrics"
    spec:
      terminationGracePeriodSeconds: 3600
      nodeSelector:
        kubernetes.io/os: linux
      imagePullSecrets:
      - name: jfrog-delegate-secret
      containers:
      - image: harness-docker-dev.docker.fis.dev/harness/delegate:24.12.84704
        imagePullPolicy: Always
        name: delegate
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 0
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "2048Mi"
            cpu: "1"
          requests:
            cpu: "0.5"
            memory: "2048Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3460
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: 3460
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 15
        envFrom:
        - secretRef:
            name: sample-delegate-account-token
        env:
        - name: JAVA_OPTS
          value: "-Xms64M"
        - name: ACCOUNT_ID
          value: XzgUIuZXRMWymCzLKYZpCg
        - name: MANAGER_HOST_AND_PORT
          value: https://app.harness.io/gratis
        - name: DEPLOY_MODE
          value: KUBERNETES
        - name: DELEGATE_NAME
          value: sample-delegate
        - name: DELEGATE_TYPE
          value: "KUBERNETES"
        - name: DELEGATE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INIT_SCRIPT
          value: |
            microdnf update -y
            microdnf install -y zip unzip
            microdnf install -y python3-pip
            ## Install AWS CLI
            rpm --import https://packages.microsoft.com/keys/microsoft.asc
            ## Install Powershell
            rpm -Uvh 'https://packages.microsoft.com/config/rhel/8/packages-microsoft-prod.rpm'
            microdnf install azure-cli
            microdnf install powershell
        - name: DELEGATE_DESCRIPTION
          value: "Sample Delegate"
        - name: DELEGATE_TAGS
          value: "SetviaAPI"
        - name: NEXT_GEN
          value: "true"
        - name: CLIENT_TOOLS_DOWNLOAD_DISABLED
          value: "true"
        - name: LOG_STREAMING_SERVICE_URL
          value: "https://app.harness.io/gratis/log-service/"
        - name: DELEGATE_RESOURCE_THRESHOLD
          value: ""
        - name: DYNAMIC_REQUEST_HANDLING
          value: "false"


---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-delegate-hpa
  namespace: harness-delegate-ng
  labels:
    harness.io/name: sample-delegate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-delegate
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70


---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: upgrader-cronjob
  namespace: harness-delegate-ng
rules:
- apiGroups: ["batch", "apps", "extensions"]
  resources: ["cronjobs"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["extensions", "apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]


---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: sample-delegate-upgrader-cronjob
  namespace: harness-delegate-ng
subjects:
- kind: ServiceAccount
  name: upgrader-cronjob-sa
  namespace: harness-delegate-ng
roleRef:
  kind: Role
  name: upgrader-cronjob
  apiGroup: ""


---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: upgrader-cronjob-sa
  namespace: harness-delegate-ng


---
apiVersion: v1
kind: Secret
metadata:
  name: sample-delegate-upgrader-token
  namespace: harness-delegate-ng
type: Opaque
data:
  UPGRADER_TOKEN: ""


---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-delegate-upgrader-config
  namespace: harness-delegate-ng
data:
  config.yaml: |
    mode: Delegate
    dryRun: false
    workloadName: sample-delegate
    namespace: harness-delegate-ng
    containerName: delegate
    delegateConfig:
      accountId: XzgUIuZXRMWymCzLKYZpCg
      managerHost: https://app.harness.io/gratis


---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    harness.io/name: sample-delegate-upgrader-job
  name: sample-delegate-upgrader-job
  namespace: harness-delegate-ng
spec:
  schedule: "0 */1 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 20
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: upgrader-cronjob-sa
          nodeSelector:
            kubernetes.io/os: linux
          imagePullSecrets:
          - name: jfrog-upgrader-secret
          containers:
          - image: harness-docker-dev.docker.fis.dev/harness/upgrader:latest
            name: upgrader
            imagePullPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
            envFrom:
            - secretRef:
                name: sample-delegate-upgrader-token
            volumeMounts:
            - name: config-volume
              mountPath: /etc/config
          restartPolicy: OnFailure
          volumes:
          - name: config-volume
            configMap:
              name: sample-delegate-upgrader-config
